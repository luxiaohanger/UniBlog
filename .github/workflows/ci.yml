name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # prisma validate 不连库，但 CLI 可能要求占位连接串
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniblog_ci
      # Next 构建期嵌入；与真实开发端口无关，仅满足打包
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
